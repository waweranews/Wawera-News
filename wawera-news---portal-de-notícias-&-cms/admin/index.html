<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wawera News | Admin</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.registerEventListener({
        name: 'preSave',
        handler: ({ entry }) => {
          const data = entry.get('data');
          if (data.get('category') === 'Automático' || !data.get('category')) {
            // In a real scenario, we'd use an AI or keyword analysis here.
            // For now, we default to "Entretenimento" as per requirements.
            return data.set('category', 'Entretenimento');
          }
        },
      });
    </script>
  </body>
</html>
